<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">HalfFull frontend architecture summary</title>
  <desc id="desc">Current frontend structure with a single app route tree and shared code under src.</desc>
  <style>
    .bg { fill: #f6f7fb; }
    .card { fill: #ffffff; stroke: #b8c1db; stroke-width: 2; rx: 18; ry: 18; }
    .title { font: 700 28px Arial, sans-serif; fill: #1c2233; }
    .subtitle { font: 400 16px Arial, sans-serif; fill: #5b6480; }
    .section { font: 700 18px Arial, sans-serif; fill: #314062; }
    .item { font: 400 15px Arial, sans-serif; fill: #2b3347; }
    .small { font: 400 14px Arial, sans-serif; fill: #5b6480; }
    .line { stroke: #7d8cbc; stroke-width: 3; stroke-linecap: round; }
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="720"/>

  <text class="title" x="60" y="70">HalfFull Frontend</text>
  <text class="subtitle" x="60" y="100">Current structure after removing the stale duplicate route tree.</text>

  <rect class="card" x="60" y="150" width="300" height="220"/>
  <text class="section" x="85" y="190">Active Routes</text>
  <text class="item" x="85" y="225">frontend/app</text>
  <text class="small" x="85" y="255">/start → /consent → /assessment</text>
  <text class="small" x="85" y="280">→ /clarify → /processing → /results</text>
  <text class="small" x="85" y="320">API routes also live here:</text>
  <text class="small" x="85" y="345">score, bayesian-questions,</text>
  <text class="small" x="85" y="370">bayesian-update, analyze,</text>
  <text class="small" x="85" y="395">deep-analyze, extract-labs</text>

  <rect class="card" x="450" y="150" width="300" height="220"/>
  <text class="section" x="475" y="190">Shared Code</text>
  <text class="item" x="475" y="225">frontend/src</text>
  <text class="small" x="475" y="255">components/</text>
  <text class="small" x="475" y="280">hooks/useAssessment.ts</text>
  <text class="small" x="475" y="305">data/quiz_nhanes_v2.json</text>
  <text class="small" x="475" y="330">lib/questions.ts</text>
  <text class="small" x="475" y="355">lib/medgemma.ts</text>
  <text class="small" x="475" y="380">lib/formatAnswers.ts</text>

  <rect class="card" x="840" y="150" width="300" height="220"/>
  <text class="section" x="865" y="190">Server Utility</text>
  <text class="item" x="865" y="225">frontend/lib</text>
  <text class="small" x="865" y="255">medgemma-safety.ts</text>
  <text class="small" x="865" y="290">Used by safety/analyze</text>
  <text class="small" x="865" y="315">server routes for schema</text>
  <text class="small" x="865" y="340">validation and hard rules</text>

  <line class="line" x1="360" y1="260" x2="450" y2="260"/>
  <line class="line" x1="750" y1="260" x2="840" y2="260"/>

  <rect class="card" x="60" y="450" width="1080" height="180"/>
  <text class="section" x="85" y="490">Important Notes</text>
  <text class="item" x="85" y="525">Only one route tree remains: frontend/app</text>
  <text class="item" x="85" y="555">frontend/src now contains shared code only, not pages</text>
  <text class="item" x="85" y="585">Assessment state key: halffull_assessment_v2</text>
  <text class="item" x="85" y="615">Active quiz source: frontend/src/data/quiz_nhanes_v2.json</text>
</svg>
