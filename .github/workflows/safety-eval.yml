name: Safety Eval

on:
  pull_request:
    paths:
      - "frontend/**"
      - "evals/safety/**"
      - ".github/workflows/safety-eval.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "evals/safety/**"
      - ".github/workflows/safety-eval.yml"

jobs:
  safety-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install eval dependencies
        run: python3 -m pip install requests

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Start Next app
        working-directory: frontend
        run: npm run dev > /tmp/halffull-next.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3000 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/halffull-next.log
          exit 1

      - name: Run safety eval
        run: python3 evals/safety/run_safety_eval.py --base-url http://127.0.0.1:3000
